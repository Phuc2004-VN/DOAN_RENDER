<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/head :: head('Chat hỗ trợ | GreenSpace Admin')}"></head>

<body>
<style>
    .admin-chat-page {
        padding: 24px;
        min-height: 100vh;
    }

    .admin-chat-shell {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        height: calc(100vh - 48px);
    }

    .admin-chat-users,
    .admin-chat-main {
        background: rgba(255,255,255,0.94);
        border: 1px solid rgba(48, 85, 55, 0.08);
        border-radius: 24px;
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
        overflow: hidden;
    }

    .admin-chat-users-head,
    .admin-chat-main-head {
        padding: 18px 20px;
        font-size: 28px;
        font-weight: 800;
        color: #1f2937;
        border-bottom: 1px solid rgba(48, 85, 55, 0.08);
        font-family: 'Cormorant Garamond', serif;
    }

    .admin-chat-user-list {
        padding: 10px;
        overflow-y: auto;
        height: calc(100% - 74px);
    }

    .admin-chat-user-item {
        width: 100%;
        border: none;
        background: #fff;
        border-radius: 16px;
        padding: 14px 16px;
        margin-bottom: 10px;
        text-align: left;
        cursor: pointer;
        border: 1px solid rgba(48, 85, 55, 0.08);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
    }

    .admin-chat-user-item:hover,
    .admin-chat-user-item.active {
        background: rgba(111, 154, 85, 0.10);
        border-color: rgba(111, 154, 85, 0.24);
    }

    .admin-chat-user-name {
        font-size: 15px;
        font-weight: 800;
        color: #1f2937;
        word-break: break-word;
    }

    .admin-chat-user-badge {
        min-width: 24px;
        height: 24px;
        padding: 0 7px;
        border-radius: 999px;
        background: #ef4444;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        flex-shrink: 0;
    }

    .admin-chat-main {
        display: flex;
        flex-direction: column;
    }

    .admin-chat-main-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
    }

    .admin-chat-main-sub {
        font-size: 14px;
        color: #6b7280;
        font-weight: 600;
        margin-top: 4px;
        font-family: inherit;
    }

    .admin-chat-messages {
        flex: 1;
        padding: 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background:
            radial-gradient(circle at top right, rgba(111,154,85,0.08), transparent 34%),
            linear-gradient(180deg, rgba(248,249,245,0.98), rgba(255,255,255,0.98));
    }

    .admin-chat-empty {
        margin: auto;
        color: #6b7280;
        text-align: center;
        line-height: 1.7;
    }

    .msg {
        max-width: 74%;
        padding: 10px 12px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .msg.me {
        align-self: flex-end;
        background: linear-gradient(135deg, #6f9a55 0%, #305537 100%);
        color: #fff;
        border-bottom-right-radius: 6px;
    }

    .msg.other {
        align-self: flex-start;
        background: #fff;
        color: #374151;
        border: 1px solid rgba(48, 85, 55, 0.08);
        border-bottom-left-radius: 6px;
    }

    .admin-chat-input-wrap {
        padding: 14px;
        border-top: 1px solid rgba(48, 85, 55, 0.08);
        background: #fff;
    }

    .admin-chat-input {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .admin-chat-input input {
        flex: 1;
        height: 52px;
        border-radius: 16px;
        border: 1px solid rgba(48, 85, 55, 0.10);
        background: #f7f8f5;
        padding: 0 16px;
        outline: none;
        font-size: 14px;
    }

    .admin-chat-input button {
        min-width: 86px;
        height: 52px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #6f9a55 0%, #305537 100%);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
    }

    .admin-chat-input button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    @media (max-width: 900px) {
        .admin-chat-shell {
            grid-template-columns: 1fr;
            height: auto;
        }

        .admin-chat-users {
            min-height: 220px;
        }

        .admin-chat-main {
            min-height: 70vh;
        }
    }
</style>

<div class="admin-chat-page">
    <div class="admin-chat-shell">

        <div class="admin-chat-users">
            <div class="admin-chat-users-head">Người dùng</div>
            <div id="userList" class="admin-chat-user-list"></div>
        </div>

        <div class="admin-chat-main">
            <div class="admin-chat-main-head">
                <div>
                    <div id="chatTitle">Chọn user</div>
                    <div class="admin-chat-main-sub">Theo dõi và trả lời tin nhắn hỗ trợ theo thời gian thực</div>
                </div>
                <a href="/admin" class="btn btn-outline">← Dashboard</a>
            </div>

            <div id="chatMessages" class="admin-chat-messages">
                <div id="adminEmptyState" class="admin-chat-empty">
                    Chọn một người dùng ở bên trái để xem và trả lời hội thoại.
                </div>
            </div>

            <div class="admin-chat-input-wrap">
                <div class="admin-chat-input">
                    <input id="chatInput" placeholder="Nhập phản hồi..." onkeydown="handleAdminEnter(event)">
                    <button id="sendBtn" type="button" onclick="sendMessage()">Gửi</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
    const ROLE_ADMIN = 'ad';
    let stompClient = null;
    let currentUser = null;
    let unreadMap = {};
    let sending = false;

    function normalizeText(value) {
        return (value || '').trim().toLowerCase();
    }

    async function loadUnreadDetail() {
        try {
            const response = await fetch('/admin/chat/unread-detail');
            if (!response.ok) {
                throw new Error('Không tải được unread detail');
            }

            const data = await response.json();
            unreadMap = data && data.senders ? data.senders : {};
        } catch (e) {
            console.error('Lỗi load unread detail:', e);
            unreadMap = {};
        }
    }

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/admin', function (msg) {
                const data = JSON.parse(msg.body);
                if (!data || !data.content) return;

                const sender = (data.sender || '').trim();
                const receiver = (data.receiver || '').trim();
                const selected = normalizeText(currentUser);
                const content = (data.content || '').trim();

                if (!content) return;

                if (selected && (normalizeText(sender) === selected || normalizeText(receiver) === selected)) {
                    appendAdminMessage(sender, content);

                    if (normalizeText(sender) === selected && normalizeText(receiver) === normalizeText(ROLE_ADMIN)) {
                        markCurrentChatAsRead();
                    }
                } else if (normalizeText(sender) !== normalizeText(ROLE_ADMIN) && normalizeText(receiver) === normalizeText(ROLE_ADMIN)) {
                    unreadMap[sender] = (unreadMap[sender] || 0) + 1;
                }

                loadUsers();
            });
        }, function (error) {
            console.error('WebSocket lỗi:', error);
        });
    }

    function loadUsers() {
        fetch('/admin/chat/users')
            .then(res => res.json())
            .then(users => {
                const list = document.getElementById('userList');
                list.innerHTML = '';

                if (!users || users.length === 0) {
                    list.innerHTML = '<div style="padding:14px; color:#6b7280;">Chưa có hội thoại nào</div>';
                    return;
                }

                users.forEach(user => {
                    const btn = document.createElement('button');
                    btn.className = 'admin-chat-user-item';

                    if (user === currentUser) {
                        btn.classList.add('active');
                    }

                    const name = document.createElement('div');
                    name.className = 'admin-chat-user-name';
                    name.textContent = user;
                    btn.appendChild(name);

                    const unread = unreadMap[user] || 0;
                    if (unread > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'admin-chat-user-badge';
                        badge.textContent = unread;
                        btn.appendChild(badge);
                    }

                    btn.onclick = () => openChat(user);
                    list.appendChild(btn);
                });
            })
            .catch(err => console.error('Lỗi load user chat:', err));
    }

    function markCurrentChatAsRead() {
        if (!currentUser) return;

        fetch('/admin/chat/read?username=' + encodeURIComponent(currentUser), {
            method: 'POST'
        })
        .then(() => {
            unreadMap[currentUser] = 0;
            loadUsers();
        })
        .catch(err => console.error('Lỗi mark read:', err));
    }

    function openChat(username) {
        currentUser = username;
        unreadMap[username] = 0;

        document.getElementById('chatTitle').textContent = 'Chat với: ' + username;
        document.getElementById('chatMessages').innerHTML = '';

        fetch('/admin/chat/messages?username=' + encodeURIComponent(username))
            .then(res => res.json())
            .then(messages => {
                const box = document.getElementById('chatMessages');

                if (!messages || messages.length === 0) {
                    box.innerHTML = '<div class="admin-chat-empty">Chưa có tin nhắn nào</div>';
                } else {
                    messages.forEach(msg => appendAdminMessage(msg.sender, msg.content));
                }

                box.scrollTop = box.scrollHeight;
                markCurrentChatAsRead();
            })
            .catch(err => console.error('Lỗi load lịch sử chat:', err));

        loadUsers();
    }

    function handleAdminEnter(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendMessage();
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        if (!input || !sendBtn) return;

        const content = input.value.trim();

        if (!currentUser) {
            alert('Vui lòng chọn user trước');
            return;
        }

        if (!content) return;
        if (sending) return;

        sending = true;
        sendBtn.disabled = true;

        try {
            const response = await fetch('/chat/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    sender: ROLE_ADMIN,
                    receiver: currentUser,
                    content: content
                })
            });

            if (!response.ok) {
                throw new Error('Gửi phản hồi thất bại');
            }

            input.value = '';
            input.focus();
            loadUsers();
        } catch (e) {
            console.error(e);
            alert('Không gửi được phản hồi.');
        } finally {
            sending = false;
            sendBtn.disabled = false;
        }
    }

    function appendAdminMessage(sender, content) {
        const box = document.getElementById('chatMessages');
        if (!box || !content) return;

        const empty = document.getElementById('adminEmptyState');
        if (empty) {
            empty.style.display = 'none';
        }

        const currentEmpty = box.querySelector('.admin-chat-empty');
        if (currentEmpty) {
            currentEmpty.remove();
        }

        const div = document.createElement('div');
        div.classList.add('msg');
        div.classList.add(normalizeText(sender) === normalizeText(ROLE_ADMIN) ? 'me' : 'other');
        div.textContent = content;

        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.addEventListener('DOMContentLoaded', async function () {
        await loadUnreadDetail();
        connect();
        loadUsers();
    });
</script>

</body>
</html>
